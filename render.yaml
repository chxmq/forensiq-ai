# Deploy: https://dashboard.render.com → New → Blueprint → connect chxmq/forensiq-ai
services:
  - type: web
    name: forensiq-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: FORENSIQ_ENVIRONMENT
        value: production
      - key: FORENSIQ_STATIC_DIR
        value: /app/frontend/dist
    # Optional: attach a disk for persistent SQLite + uploads between deploys
    # disk:
    #   name: forensiq-data
    #   mountPath: /app/backend/storage
    #   sizeGB: 1
