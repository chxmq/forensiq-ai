# Deploy: https://dashboard.render.com → New → Blueprint → connect chxmq/forensiq-ai
services:
  - type: web
    name: forensiq-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: FORENSIQ_ENVIRONMENT
        value: production
      - key: FORENSIQ_STATIC_DIR
        value: /app/frontend/dist
      - key: FORENSIQ_AUTH_ENABLED
        value: "true"
      - key: FORENSIQ_AUTH_SECRET
        generateValue: true
      - key: FORENSIQ_AUTH_PASSWORD
        generateValue: true
    disk:
      name: forensiq-data
      mountPath: /app/backend/storage
      sizeGB: 1
